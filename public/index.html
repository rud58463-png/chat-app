<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ห้องแชท</title>
  <script src="/socket.io/socket.io.js"></script>
  <!-- เพิ่ม Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
    body { background: #1a1a1a; color: #fff; }
    .login-page { text-align: center; margin-top: 150px; }
    .login-page h2 { margin-bottom: 30px; color: #ff4444; }
    .btn { padding: 12px 24px; margin: 10px; font-size: 16px; border-radius: 8px; border: none; cursor: pointer; color: #fff; }
    .btn-google { background: #4285F4; }
    .btn-facebook { background: #1877F2; }
    .chat-page { display: none; max-width: 800px; margin: 0 auto; padding: 20px; }
    .messages { height: 400px; overflow-y: auto; border: 1px solid #333; padding: 15px; margin-bottom: 15px; border-radius: 8px; }
    .message { margin-bottom: 10px; }
    .input-area { display: flex; gap: 10px; }
    input { flex: 1; padding: 12px; border: 1px solid #333; border-radius: 8px; background: #222; color: #fff; }
    button { padding: 12px 20px; border: none; border-radius: 8px; background: #28a745; color: #fff; cursor: pointer; }
  </style>
</head>
<body>
  <div id="loginPage" class="login-page">
    <h2>⚠️ กรุณาเข้าสู่ระบบก่อนใช้งานแชท</h2>
    <button class="btn btn-google" onclick="loginWithGoogle()">เข้าสู่ระบบด้วย Google</button>
    <br>
    <button class="btn btn-facebook" onclick="loginWithFacebook()">เข้าสู่ระบบด้วย Facebook</button>
  </div>

  <div id="chatPage" class="chat-page">
    <h3>ยินดีต้อนรับ, <span id="userName"></span></h3>
    <div id="messages" class="messages"></div>
    <div class="input-area">
      <input type="text" id="messageInput" placeholder="พิมพ์ข้อความ...">
      <button onclick="sendMessage()">ส่ง</button>
    </div>
  </div>

  <script>
    // ใส่ค่า firebaseConfig ที่คุณคัดลอกมาจาก Firebase ตรงนี้ครับ
    const firebaseConfig = {
      apiKey: "AIzaSyA******",
      authDomain: "chat-app-rudjiroad.firebaseapp.com",
      projectId: "chat-app-rudjiroad",
      storageBucket: "chat-app-rudjiroad.appspot.com",
      messagingSenderId: "744167583213",
      appId: "1:744167583213:web:71b2e3a7b1d7194"
    };

    // เริ่มต้น Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    let socket, currentUser;

    // ตรวจสอบสถานะล็อกอิน
    auth.onAuthStateChanged(user => {
      if (user) {
        // ล็อกอินสำเร็จ → เปิดห้องแชท
        currentUser = {
          name: user.displayName || user.email,
          uid: user.uid,
          avatar: user.photoURL || ""
        };
        document.getElementById("userName").textContent = currentUser.name;
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("chatPage").style.display = "block";
        initChat();
      } else {
        // ยังไม่ล็อกอิน → แสดงหน้าล็อกอิน
        document.getElementById("loginPage").style.display = "block";
        document.getElementById("chatPage").style.display = "none";
      }
    });

    // ล็อกอินด้วย Google
    function loginWithGoogle() {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider)
        .catch(err => alert("ผิดพลาด: " + err.message));
    }

    // ล็อกอินด้วย Facebook
    function loginWithFacebook() {
      const provider = new firebase.auth.FacebookAuthProvider();
      auth.signInWithPopup(provider)
        .catch(err => alert("ผิดพลาด: " + err.message));
    }

    // เริ่มต้นระบบแชท
    function initChat() {
      socket = io();
      socket.on("connect", () => {
        console.log("เชื่อมต่อเซิร์ฟเวอร์สำเร็จ");
      });
      socket.on("receive_message", (data) => {
        addMessage(data);
      });
    }

    // ส่งข้อความ
    function sendMessage() {
      const input = document.getElementById("messageInput");
      const text = input.value.trim();
      if (!text) return;
      const message = {
        name: currentUser.name,
        uid: currentUser.uid,
        text: text,
        time: new Date().toLocaleTimeString("th-TH")
      };
      socket.emit("send_message", message);
      addMessage(message);
      input.value = "";
    }

    // แสดงข้อความ
    function addMessage(data) {
      const messagesDiv = document.getElementById("messages");
      const div = document.createElement("div");
      div.className = "message";
      div.innerHTML = `<strong>${data.name}</strong> [${data.time}]: ${data.text}`;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // กด Enter ส่งข้อความ
    document.getElementById("messageInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
