<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Chat Room</title>

<style>

body{
    margin:0;
    background:#111;
    color:white;
    font-family:sans-serif;
}

header{
    padding:15px;
    background:#222;
}

#chat{
    height:60vh;
    overflow:auto;
    border-top:1px solid #333;
    border-bottom:1px solid #333;
    padding:10px;
}

#online,#myName{
    margin-top:5px;
}

#joinBox{
    padding:10px;
}

#bottomBar{
    display:flex;
    padding:10px;
    gap:10px;
}

input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
}

button{
    padding:12px;
    border:none;
    border-radius:10px;
}

.msg{
    background:#222;
    padding:10px;
    margin-bottom:8px;
    border-radius:10px;
}

</style>
</head>

<body>

<header>

<h2>💬 ห้องแชทรวม</h2>

<div id="online">
👥 ออนไลน์: 0 คน
</div>

<div id="myName">
👤 ชื่อของคุณ: ยังไม่ได้ Join
</div>

</header>

<div id="joinBox">
<input id="username" placeholder="ตั้งชื่อ">
<button onclick="joinChat()">Join</button>
</div>

<div id="chat"></div>

<div id="bottomBar">
<input id="msg" placeholder="พิมพ์ข้อความ">
<button onclick="sendMsg()">ส่ง</button>
</div>

<script>

const protocol =
location.protocol === "https:" ? "wss://" : "ws://";

const ws =
new WebSocket(protocol + location.host);

const chat =
document.getElementById("chat");

let joined = false;

ws.onmessage = (event)=>{

    const data =
    JSON.parse(event.data);

    if(data.type === "online"){

        document.getElementById("online").innerHTML =
        "👥 ออนไลน์: " + data.count + " คน";

    }

    if(data.type === "message"){

        chat.innerHTML +=
        `<div class="msg">${data.text}</div>`;

        chat.scrollTop =
        chat.scrollHeight;

    }

};

function joinChat(){

    const username =
    document.getElementById("username").value;

    if(username.trim() === "") return;

    localStorage.setItem(
        "chatName",
        username
    );

    document.getElementById("myName").innerHTML =
    "👤 ชื่อของคุณ: " + username;

    ws.send(JSON.stringify({
        type:"join",
        username:username
    }));

    document.getElementById("joinBox")
    .style.display = "none";

    joined = true;

}

function sendMsg(){

    if(!joined) return;

    const msg =
    document.getElementById("msg");

    if(msg.value.trim() !== ""){

        ws.send(JSON.stringify({
            type:"chat",
            text:msg.value
        }));

        msg.value = "";

    }

}

window.onload = ()=>{

    const savedName =
    localStorage.getItem("chatName");

    if(savedName){

        document.getElementById("username").value =
        savedName;

        document.getElementById("myName").innerHTML =
        "👤 ชื่อของคุณ: " + savedName;

        ws.send(JSON.stringify({
            type:"join",
            username:savedName
        }));

        document.getElementById("joinBox")
        .style.display = "none";

        joined = true;

    }

};

</script>

</body>
</html>
