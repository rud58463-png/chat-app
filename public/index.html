<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Chat Room</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#111;
    color:white;
    font-family:sans-serif;
    display:flex;
    flex-direction:column;
    height:100vh;
}

header{
    background:#1b1b1b;
    padding:15px;
    border-bottom:1px solid #333;
}

h2{
    margin:0;
}

#online,
#myName{
    margin-top:8px;
    font-size:16px;
}

#joinBox{
    padding:15px;
    display:flex;
    gap:10px;
}

#joinBox input{
    flex:1;
}

#chat{
    flex:1;
    overflow-y:auto;
    padding:12px;
    background:#181818;
}

.msg{
    background:#222;
    margin-bottom:8px;
    padding:10px;
    border-radius:10px;
    word-break:break-word;
}

#bottomBar{
    display:flex;
    gap:10px;
    padding:12px;
    border-top:1px solid #333;
    background:#1b1b1b;
}

input{
    border:none;
    outline:none;
    border-radius:12px;
    padding:14px;
    font-size:16px;
}

button{
    border:none;
    border-radius:12px;
    padding:14px 20px;
    font-size:16px;
    cursor:pointer;
}

#msg{
    flex:1;
}

</style>
</head>

<body>

<header>

<h2>💬 ห้องแชทรวม</h2>

<div id="online">
👥 ออนไลน์: 0 คน
</div>

<div id="myName">
👤 ชื่อของคุณ: ยังไม่ได้ Join
</div>

</header>

<div id="joinBox">
<input id="username" placeholder="ตั้งชื่อ">
<button onclick="joinChat()">Join</button>
</div>

<div id="chat"></div>

<div id="bottomBar">
<input id="msg" placeholder="พิมพ์ข้อความ">
<button onclick="sendMsg()">ส่ง</button>
</div>

<script>

const chat =
document.getElementById("chat");

const usernameInput =
document.getElementById("username");

const joinBox =
document.getElementById("joinBox");

const myName =
document.getElementById("myName");

const online =
document.getElementById("online");

const msgInput =
document.getElementById("msg");

const params =
new URLSearchParams(
window.location.search
);

const appName =
params.get("name");

let joined = false;
let ws = null;

// connect websocket
function connect(){

    const protocol =
    location.protocol === "https:"
    ? "wss://"
    : "ws://";

    ws =
    new WebSocket(
        protocol +
        location.host
    );

    ws.onopen = function(){

        console.log(
            "connected"
        );

        joined = false;

        let savedName =
        localStorage.getItem(
            "chatName"
        );

        // ถ้าเปิดจาก MIT App
        if(
            appName &&
            appName.trim() !== ""
        ){

            savedName =
            appName;

            localStorage.setItem(
                "chatName",
                appName
            );
        }

        // auto join
        if(
            savedName &&
            savedName.trim() !== ""
        ){

            usernameInput.value =
            savedName;

            // delay ให้ MIT WebViewer พร้อม
            setTimeout(function(){

                join(savedName);

            },500);

        }

    };

    ws.onmessage =
    function(event){

        const data =
        JSON.parse(
            event.data
        );

        if(
            data.type ===
            "clear"
        ){

            chat.innerHTML =
            "";

        }

        if(
            data.type ===
            "online"
        ){

            online.innerHTML =
            "👥 ออนไลน์: "
            +
            data.count
            +
            " คน";

        }

        if(
            data.type ===
            "message"
        ){

            chat.innerHTML +=
            '<div class="msg">'
            +
            data.text
            +
            '</div>';

            chat.scrollTop =
            chat.scrollHeight;

        }

    };

    ws.onclose =
    function(){

        joined = false;

        myName.innerHTML =
        "⏳ reconnecting...";

        setTimeout(
            connect,
            2000
        );

    };

}

// join room
function join(username){

    if(
        !ws ||
        ws.readyState !==
        WebSocket.OPEN
    ){
        return;
    }

    if(joined)
    return;

    username =
    username.trim();

    if(username === "")
    return;

    // save name
    localStorage.setItem(
        "chatName",
        username
    );

    usernameInput.value =
    username;

    myName.innerHTML =
    "👤 ชื่อของคุณ: "
    +
    username;

    ws.send(
        JSON.stringify({
            type:"join",
            username:username
        })
    );

    joinBox.style.display =
    "none";

    joined = true;

}

// join button
function joinChat(){

    const username =
    usernameInput.value;

    join(username);

}

// send message
function sendMsg(){

    if(!joined)
    return;

    if(
        !ws ||
        ws.readyState !==
        WebSocket.OPEN
    ){
        return;
    }

    const text =
    msgInput.value.trim();

    if(text === "")
    return;

    ws.send(
        JSON.stringify({
            type:"chat",
            text:text
        })
    );

    msgInput.value =
    "";

}

// enter send
msgInput.addEventListener(
    "keypress",
    function(e){

        if(
            e.key ===
            "Enter"
        ){

            sendMsg();

        }

    }
);

// start
connect();

</script>

</body>
</html>
