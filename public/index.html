<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat Room</title>

<style>

body{
    background:#111;
    color:white;
    font-family:sans-serif;
    padding:20px;
}

#joinBox{
    margin-bottom:20px;
}

#online,
#myName{
    margin-bottom:10px;
    font-size:20px;
}

#chat{
    height:400px;
    border:1px solid #444;
    overflow:auto;
    padding:10px;
    margin-bottom:10px;
}

input{
    padding:10px;
}

button{
    padding:10px;
}

</style>
</head>

<body>

<h2>ห้องแชทรวม</h2>

<div id="online">
👥 ออนไลน์: 0 คน
</div>

<div id="myName">
👤 ชื่อของคุณ: ยังไม่ได้ Join
</div>

<div id="joinBox">
    <input id="username" placeholder="ตั้งชื่อ">
    <button onclick="joinChat()">Join</button>
</div>

<div id="chat"></div>

<input id="msg" placeholder="พิมพ์ข้อความ">
<button onclick="sendMsg()">ส่ง</button>

<script>

const protocol =
location.protocol === "https:" ? "wss://" : "ws://";

const ws = new WebSocket(protocol + location.host);

const chat = document.getElementById("chat");

let joined = false;
let myName = "";

ws.onmessage = (event)=>{

    const data = JSON.parse(event.data);

    if(data.type === "online"){

        document.getElementById("online").innerHTML =
        "👥 ออนไลน์: " + data.count + " คน";

    }

    if(data.type === "message"){

        chat.innerHTML += `<div>${data.text}</div>`;

        chat.scrollTop = chat.scrollHeight;

    }

};

function joinChat(){

    const username =
    document.getElementById("username").value;

    if(username.trim() === "") return;

    myName = username;

    document.getElementById("myName").innerHTML =
    "👤 ชื่อของคุณ: " + username;

    ws.send(JSON.stringify({
        type: "join",
        username: username
    }));

    document.getElementById("joinBox").style.display =
    "none";

    joined = true;

}

function sendMsg(){

    if(!joined) return;

    const msg = document.getElementById("msg");

    if(msg.value.trim() !== ""){

        ws.send(JSON.stringify({
            type: "chat",
            text: msg.value
        }));

        msg.value = "";

    }

}

</script>

</body>
</html>
