<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ห้องแชทรวม</title>
<style>
*{ box-sizing:border-box; }

body{
    margin:0;
    background:#111;
    color:white;
    font-family:sans-serif;
    display:flex;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
    width:100%;
}

header{
    background:#1b1b1b;
    padding:15px;
    border-bottom:1px solid #333;
    display:flex;
    align-items:center;
    gap:12px;
}

.user-avatar{
    width:40px;
    height:40px;
    border-radius:50%;
    background:#444;
    flex-shrink:0;
    object-fit:cover;
}

.header-text{
    flex:1;
}

h2{ margin:0; font-size:20px; }

#online, #myName{
    margin-top:4px;
    font-size:14px;
    color:#ccc;
}

#joinBox{
    padding:30px 15px;
    text-align:center;
    display:none; /* ซ่อนช่องกรอกชื่อตลอดเวลา */
}

#joinBox input{ flex:1; }

#chat{
    flex:1;
    overflow-y:auto;
    padding:12px;
    background:#181818;
}

.msg{
    background:#222;
    margin-bottom:8px;
    padding:10px;
    border-radius:10px;
    word-break:break-word;
}

.msgTime{
    font-size:11px;
    color:#888;
    text-align:right;
    margin-top:4px;
}

#bottomBar{
    display:flex;
    gap:10px;
    padding:12px;
    padding-bottom:max(12px, env(safe-area-inset-bottom));
    border-top:1px solid #333;
    background:#1b1b1b;
    width:100%;
    box-sizing:border-box;
    align-items:center;
}

input{
    border:none;
    outline:none;
    border-radius:12px;
    padding:14px;
    font-size:16px;
    background:#252525;
    color:white;
}

button{
    border:none;
    border-radius:12px;
    padding:14px 20px;
    font-size:16px;
    cursor:pointer;
    flex-shrink:0;
    background:#007bff;
    color:white;
}

#msg{
    flex:1;
    min-width:0;
    box-sizing:border-box;
}

#errorMsg{
    display:none;
    text-align:center;
    margin-top:50px;
    padding:20px;
    color:#ff6b6b;
    font-size:18px;
}
</style>
</head>

<body>

<div id="errorMsg">⚠️ กรุณาเข้าสู่ระบบผ่านแอปก่อนใช้งานแชท</div>

<header id="chatHeader" style="display:none;">
    <img id="userAvatar" class="user-avatar" src="" alt="รูปโปรไฟล์">
    <div class="header-text">
        <h2>💬 ห้องแชทรวม</h2>
        <div id="online">👥 ออนไลน์: 0 คน</div>
        <div id="myName">👤 ชื่อของคุณ: <span id="displayName"></span></div>
    </div>
</header>

<div id="joinBox">
    <input id="username" placeholder="ตั้งชื่อ">
    <button onclick="joinChat()">Join</button>
</div>

<div id="chat"></div>

<div id="bottomBar" style="display:none;">
    <input id="msg" placeholder="พิมพ์ข้อความ" maxlength="60">
    <button onclick="sendMsg()">ส่ง</button>
</div>

<script>
const chat = document.getElementById("chat");
const params = new URLSearchParams(window.location.search);

// ✅ รับข้อมูลจากแอปเท่านั้น
const appName = params.get("name") || "";
const appUid = params.get("uid") || "";
const appAvatar = params.get("avatar") || "";

let joined = false;
let ws = null;
let currentUsername = "";
let reconnectTimeout = null;

// ป้องกันโค้ดแทรก
function escapeHTML(str) {
    return str.replace(/[&<>'"]/g, 
        tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
    );
}

// ✅ ตรวจสอบว่ามาจากแอปจริงหรือไม่
if(!appName || !appUid){
    document.getElementById("errorMsg").style.display = "block";
} else {
    // แสดงหน้าแชทเมื่อข้อมูลครบถ้วน
    document.getElementById("chatHeader").style.display = "flex";
    document.getElementById("bottomBar").style.display = "flex";
    document.getElementById("displayName").textContent = appName;
    if(appAvatar) document.getElementById("userAvatar").src = appAvatar;
    currentUsername = appName;
    connect();
}

function connect(){
    if (ws && (ws.readyState === WebSocket.CONNECTING || ws.readyState === WebSocket.OPEN)) {
        return;
    }

    const protocol = location.protocol === "https:" ? "wss://" : "ws://";
    ws = new WebSocket(protocol + location.host);

    ws.onopen = ()=>{
        console.log("เชื่อมต่อสำเร็จ");
        if (reconnectTimeout) {
            clearTimeout(reconnectTimeout);
            reconnectTimeout = null;
        }
        // ส่งชื่อที่รับจากแอปไปยังเซิร์ฟเวอร์อัตโนมัติ
        if(currentUsername){
            join(currentUsername);
        }
    };

    ws.onmessage = (event)=>{
        const data = JSON.parse(event.data);

        if(data.type === "clear"){
            chat.innerHTML = "";
        }

        if(data.type === "online"){
            document.getElementById("online").innerHTML = "👥 ออนไลน์: " + data.count + " คน";
        }

        if(data.type === "message"){
            const msgDate = data.time ? new Date(data.time) : new Date();
            const timeStr = msgDate.toLocaleString("th-TH", {
                hour: "2-digit",
                minute: "2-digit"
            });

            const safeText = escapeHTML(data.text);
            const safeUser = data.username ? `<strong>${escapeHTML(data.username)}:</strong> ` : "";

            chat.innerHTML +=
             `<div class="msg">
                ${safeUser}${safeText}
                <div class="msgTime">${timeStr}</div>
            </div>`;

            chat.scrollTop = chat.scrollHeight;
        }
    };

    ws.onclose = ()=>{
        joined = false;
        document.getElementById("myName").innerHTML = "⏳ กำลังเชื่อมต่อใหม่...";
        
        ws = null; 
        if (!reconnectTimeout) {
            reconnectTimeout = setTimeout(connect, 2000);
        }
    };

    ws.onerror = ()=>{
        if(ws) ws.close();
    };
}

function join(username){
    if(!ws || ws.readyState !== WebSocket.OPEN) return;
    if(joined) return; 

    username = username.trim();
    if(username === "") return;

    currentUsername = username;
    document.getElementById("myName").innerHTML = "👤 ชื่อของคุณ: " + username;

    ws.send(JSON.stringify({ type:"join", username:username }));
    joined = true;
}

// ❌ ปิดการใช้งานปุ่มกรอกชื่อเองทั้งหมด
function joinChat(){
    alert("กรุณาเข้าสู่ระบบผ่านแอปเท่านั้น");
}

function sendMsg(){
    if(!joined || !ws || ws.readyState !== WebSocket.OPEN) return;

    const msg = document.getElementById("msg");
    const text = msg.value.trim();
    if(text === "") return;

    ws.send(JSON.stringify({ type:"chat", text:text }));
    msg.value = "";
}

document.getElementById("msg").addEventListener("keypress", (e)=>{
    if(e.key === "Enter"){ sendMsg(); }
});
</script>

</body>
</html>
