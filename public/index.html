<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Room</title>
<style>
*{ box-sizing:border-box; }

body{
    margin:0;
    background:#111;
    color:white;
    font-family:sans-serif;
    display:flex;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
    width:100%;
}

header{
    background:#1b1b1b;
    padding:15px;
    border-bottom:1px solid #333;
}

h2{ margin:0; }

#online, #myName{
    margin-top:8px;
    font-size:16px;
}

#joinBox{
    padding:15px;
    display:flex;
    gap:10px;
}

#joinBox input{ flex:1; }

#chat{
    flex:1;
    overflow-y:auto;
    padding:12px;
    background:#181818;
}

.msg{
    background:#222;
    margin-bottom:8px;
    padding:10px;
    border-radius:10px;
    word-break:break-word;
}

.msgTime{
    font-size:11px;
    color:#888;
    text-align:right;
    margin-top:4px;
}

#bottomBar{
    display:flex;
    gap:10px;
    padding:12px;
    padding-bottom:max(12px, env(safe-area-inset-bottom));
    border-top:1px solid #333;
    background:#1b1b1b;
    width:100%;
    box-sizing:border-box;
    align-items:center;
}

input{
    border:none;
    outline:none;
    border-radius:12px;
    padding:14px;
    font-size:16px;
}

button{
    border:none;
    border-radius:12px;
    padding:14px 20px;
    font-size:16px;
    cursor:pointer;
    flex-shrink:0;
}

#msg{
    flex:1;
    min-width:0;
    box-sizing:border-box;
}
</style>
</head>

<body>

<header>
    <h2>💬 ห้องแชทรวม</h2>
    <div id="online">👥 ออนไลน์: 0 คน</div>
    <div id="myName">👤 ชื่อของคุณ: ยังไม่ได้ Join</div>
</header>

<div id="joinBox">
    <input id="username" placeholder="ตั้งชื่อ">
    <button onclick="joinChat()">Join</button>
</div>

<div id="chat"></div>

<div id="bottomBar">
    <input id="msg" placeholder="พิมพ์ข้อความ" maxlength="60">
    <button onclick="sendMsg()">ส่ง</button>
</div>

<script>
const chat = document.getElementById("chat");
const params = new URLSearchParams(window.location.search);
const appName = params.get("name");

let joined = false;
let ws = null;

function connect(){

    if (ws && (ws.readyState === WebSocket.CONNECTING || ws.readyState === WebSocket.OPEN)) {
        return;
    }
    const protocol = location.protocol === "https:" ? "wss://" : "ws://";
    ws = new WebSocket(protocol + location.host);

    ws.onopen = ()=>{
        console.log("connected");
        
        if(appName && !joined){
            document.getElementById("joinBox").style.display = "none";
            join(appName);
        }
    };

    ws.onmessage = (event)=>{
        const data = JSON.parse(event.data);

        if(data.type === "clear"){
            chat.innerHTML = "";
        }

        if(data.type === "online"){
            document.getElementById("online").innerHTML = "👥 ออนไลน์: " + data.count + " คน";
        }

        if(data.type === "message"){
            const now = new Date();
            const time = now.toLocaleString("th-TH", {
                hour: "2-digit",
                minute: "2-digit",
                day: "2-digit",
                month: "2-digit",
                year: "2-digit"
            });

             chat.innerHTML +=
             `<div class="msg">
                ${data.text}
                <div class="msgTime">${time}</div>
            </div>`;

            chat.scrollTop = chat.scrollHeight;
        }
    };

    ws.onclose = ()=>{
        joined = false;
        document.getElementById("myName").innerHTML = "⏳ กำลังเชื่อมต่อใหม่...";
        
        ws = null; 
        setTimeout(connect, 2000);
    };

    ws.onerror = ()=>{};
}

function join(username){
    if(!ws || ws.readyState !== WebSocket.OPEN) return;
    if(joined) return; // ล็อกระบบไว้ถ้าลงทะเบียนสำเร็จแล้ว ห้ามส่งซ้ำอีกรอบ

    username = username.trim();
    if(username === "") return;

    document.getElementById("username").value = username
    document.getElementById("myName").innerHTML = "👤 ชื่อของคุณ: " + username;

    ws.send(JSON.stringify({ type:"join", username:username }));
    document.getElementById("joinBox").style.display = "none";
    joined = true;
}

function joinChat(){
    const username = document.getElementById("username").value;
    join(username);
}

function sendMsg(){
    if(!joined || !ws || ws.readyState !== WebSocket.OPEN) return;

    const msg = document.getElementById("msg");
    const text = msg.value.trim();
    if(text === "") return;

    ws.send(JSON.stringify({ type:"chat", text:text }));
    msg.value = "";
}

document.getElementById("msg").addEventListener("keypress", (e)=>{
    if(e.key === "Enter"){ sendMsg(); }
});

// เริ่มต้นระบบเชื่อมต่อ
connect();
</script>

</body>
</html>
