<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Room</title>
<style>
*{ box-sizing:border-box; }
body{ margin:0; background:#111; color:white; font-family:sans-serif; display:flex; flex-direction:column; height:100vh; }
header{ background:#1b1b1b; padding:15px; border-bottom:1px solid #333; }
h2{ margin:0; }
#online, #myName{ margin-top:8px; font-size:16px; }
#joinBox{ padding:15px; display:flex; gap:10px; }
#joinBox input{ flex:1; }
#chat{ flex:1; overflow-y:auto; padding:12px; background:#181818; }
.msg{ background:#222; margin-bottom:8px; padding:10px; border-radius:10px; word-break:break-word; }
#bottomBar{ display:flex; gap:10px; padding:12px; border-top:1px solid #333; background:#1b1b1b; }
input{ border:none; outline:none; border-radius:12px; padding:14px; font-size:16px; }
button{ border:none; border-radius:12px; padding:14px 20px; font-size:16px; cursor:pointer; }
#msg{ flex:1; }
</style>
</head>
<body>

<header>
  <h2>💬 ห้องแชทรวม</h2>
  <div id="online">👥 ออนไลน์: 0 คน</div>
  <div id="myName">👤 ชื่อของคุณ: ยังไม่ได้ Join</div>
</header>

<div id="joinBox">
  <input id="username" placeholder="ตั้งชื่อ">
  <button onclick="joinChat()">Join</button>
</div>

<div id="chat"></div>

<div id="bottomBar">
  <input id="msg" placeholder="พิมพ์ข้อความ">
  <button onclick="sendMsg()">ส่ง</button>
</div>

<script>

const chat = document.getElementById("chat");
const params = new URLSearchParams(window.location.search);
const appName = params.get("name");

let joined = false;
let pendingUsername = null;

function connect(){

    const ws = new WebSocket("wss://chat-app-9uzk.onrender.com");

    ws.onopen = () => {
        document.getElementById("myName").innerHTML =
            "👤 ชื่อของคุณ: ยังไม่ได้ Join";

        // ถ้ามีชื่อรอ join อยู่ ให้ join ทันที
        if(pendingUsername){
            doJoin(ws, pendingUsername);
            pendingUsername = null;
        } else {
            let savedName = localStorage.getItem("chatName");
            if(appName){ savedName = appName; }
            if(savedName){ doJoin(ws, savedName); }
        }
    };

    ws.onclose = () => {
        if(joined) return;
        // reconnect อัตโนมัติหลัง 2 วินาที
        setTimeout(connect, 2000);
    };

    ws.onerror = () => {};

    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if(data.type === "clear"){ chat.innerHTML = ""; }
        if(data.type === "online"){
            document.getElementById("online").innerHTML =
                "👥 ออนไลน์: " + data.count + " คน";
        }
        if(data.type === "message"){
            chat.innerHTML += `<div class="msg">${data.text}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }
    };

    window._ws = ws;
}

function doJoin(ws, username){
    if(joined) return;
    if(ws.readyState !== WebSocket.OPEN) return;

    localStorage.setItem("chatName", username);
    document.getElementById("username").value = username;
    document.getElementById("myName").innerHTML =
        "👤 ชื่อของคุณ: " + username;

    ws.send(JSON.stringify({ type:"join", username:username }));
    document.getElementById("joinBox").style.display = "none";
    joined = true;
}

function joinChat(){
    const username = document.getElementById("username").value;
    if(username.trim() === "") return;

    const ws = window._ws;

    if(ws && ws.readyState === WebSocket.OPEN){
        doJoin(ws, username);
    } else {
        // รอ connect แล้ว join อัตโนมัติ
        pendingUsername = username;
        document.getElementById("myName").innerHTML =
            "⏳ กำลังเชื่อมต่อ...";
    }
}

function sendMsg(){
    if(!joined) return;
    const msg = document.getElementById("msg");
    if(msg.value.trim() !== ""){
        window._ws.send(JSON.stringify({ type:"chat", text:msg.value }));
        msg.value = "";
    }
}

document.getElementById("msg").addEventListener("keypress",(e)=>{
    if(e.key === "Enter"){ sendMsg(); }
});

// เริ่ม connect
connect();

</script>
</body>
</html>
