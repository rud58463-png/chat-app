<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chat Room</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#111;
    color:white;
    font-family:sans-serif;
    display:flex;
    flex-direction:column;
    height:100vh;
}

header{
    background:#1b1b1b;
    padding:15px;
    border-bottom:1px solid #333;
}

h2{
    margin:0;
}

#online,
#myName{
    margin-top:8px;
    font-size:16px;
}

#joinBox{
    padding:15px;
    display:flex;
    gap:10px;
}

#joinBox input{
    flex:1;
}

#chat{
    flex:1;
    overflow-y:auto;
    padding:12px;
    background:#181818;
}

/* ปรับแต่งกล่องข้อความให้รองรับการใส่เวลาทางขวา */
.msg{
    background:#222;
    margin-bottom:8px;
    padding:10px;
    border-radius:10px;
    word-break:break-word;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 15px;
}

.msg-text {
    flex: 1;
}

/* สไตล์ของเวลาปัจจุบัน (สีเทา ขนาดเล็ก อยู่มุมขวา) */
.msg-time {
    color: #888;
    font-size: 12px;
    white-space: nowrap;
}

/* สไตล์สำหรับข้อความระบบ เช่น แจ้งเตือนเข้าห้อง */
.sys-msg {
    background: #333;
    margin: 8px auto;
    padding: 6px 15px;
    border-radius: 20px;
    font-size: 14px;
    color: #4caf50;
    text-align: center;
    width: fit-content;
}

#bottomBar{
    display:flex;
    gap:10px;
    padding:12px;
    border-top:1px solid #333;
    background:#1b1b1b;
}

input{
    border:none;
    outline:none;
    border-radius:12px;
    padding:14px;
    font-size:16px;
}

button{
    border:none;
    border-radius:12px;
    padding:14px 20px;
    font-size:16px;
    cursor:pointer;
}

#msg{
    flex:1;
}

</style>
</head>

<body>

<header>

<h2>💬 ห้องแชทรวม</h2>

<div id="online">
👥 ออนไลน์: 0 คน
</div>

<div id="myName">
👤 ชื่อของคุณ: ยังไม่ได้ Join
</div>

</header>

<div id="joinBox">
<input id="username" placeholder="ตั้งชื่อ">
<button onclick="joinChat()">Join</button>
</div>

<div id="chat"></div>

<div id="bottomBar">
<input id="msg" placeholder="พิมพ์ข้อความ">
<button onclick="sendMsg()">ส่ง</button>
</div>

<script>

const chat = document.getElementById("chat");

const params = new URLSearchParams(window.location.search);

const appName = params.get("name");

let joined = false;
let ws = null;

// เก็บเวลาที่ผู้ใช้งานเปิดหน้าเว็บนี้ขึ้นมา เพื่อใช้กรองไม่เอาข้อมูลเก่าย้อนหลัง
const pageLoadTime = Date.now();

// ฟังก์ชันสร้างข้อความเวลาปัจจุบันในรูปแบบ HH:mm
function getCurrentTime() {
    const now = new Date();
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    return `${hours}:${minutes}`;
}

// เชื่อมต่อ websocket
function connect(){

    const protocol = location.protocol === "https:" ? "wss://" : "ws://";

    ws = new WebSocket(protocol + location.host);

    ws.onopen = ()=>{

        console.log("connected");

        joined = false;

        let savedName = appName;

        // ถ้าเปิดจาก MIT App
        if(savedName){

            document.getElementById("joinBox").style.display = "none";

            join(savedName);

        }

    };

    ws.onmessage = (event)=>{

        const data = JSON.parse(event.data);

        if(data.type === "clear"){
            // เคลียร์หน้าจอเฉพาะแชทที่แสดงอยู่ปัจจุบัน
            chat.innerHTML = "";
        }

        if(data.type === "online"){

            document.getElementById("online").innerHTML =
            "👥 ออนไลน์: " + data.count + " คน";

        }

        if(data.type === "message"){

            // เช็คว่า Server ส่ง timestamp ย้อนหลังมาหรือไม่ 
            // ถ้าเป็นข้อความเก่าที่มีเวลาก่อนหน้าเปิดเว็บ (หรือฝั่ง Server ส่งประวัติเก่ามา) ระบบจะไม่แสดงผลลงหน้าจอ
            if (data.timestamp && data.timestamp < pageLoadTime) {
                return; 
            }

            // แยกการแสดงผล: หากเป็นข้อความแจ้งเตือนเข้าห้องแชท ให้ใช้สไตล์ระบบ
            if(data.text.includes("เข้าห้องแชทแล้ว")) {
                chat.innerHTML += `<div class="sys-msg">${data.text}</div>`;
            } else {
                // หากเป็นข้อความแชทปกติ ให้ใส่กล่องข้อความพร้อมเวลาปัจจุบันที่ได้รับแชทลงไปทางขวา
                const timeStr = getCurrentTime();
                chat.innerHTML += `
                    <div class="msg">
                        <div class="msg-text">${data.text}</div>
                        <div class="msg-time">${timeStr}</div>
                    </div>
                `;
            }

            chat.scrollTop = chat.scrollHeight;

        }

    };

    ws.onclose = ()=>{

        joined = false;

        document.getElementById("myName").innerHTML = "⏳ กำลังเชื่อมต่อใหม่...";

        setTimeout(connect, 2000);

    };

    ws.onerror = ()=>{};
}

// join ห้อง
function join(username){

    if(!ws) return;

    if(ws.readyState !== WebSocket.OPEN){
        return;
    }

    if(joined) return;

    username = username.trim();

    if(username === "") return;

    document.getElementById("username").value = username;

    document.getElementById("myName").innerHTML = "👤 ชื่อของคุณ: " + username;

    ws.send(JSON.stringify({
        type:"join",
        username:username
    }));

    document.getElementById("joinBox").style.display = "none";

    joined = true;
}

// ปุ่ม Join
function joinChat(){

    const username = document.getElementById("username").value;

    join(username);
}

// ส่งข้อความ
function sendMsg(){

    if(!joined) return;

    if(!ws || ws.readyState !== WebSocket.OPEN) return;

    const msg = document.getElementById("msg");

    const text = msg.value.trim();

    if(text === "") return;

    // ส่งข้อความไปที่ Server พร้อมแนบ timestamp ปัจจุบันไปด้วย
    ws.send(JSON.stringify({
        type:"chat",
        text:text,
        timestamp: Date.now()
    }));

    msg.value = "";
}

// Enter ส่งข้อความ
document.getElementById("msg").addEventListener("keypress", (e)=>{

    if(e.key==="Enter"){
        sendMsg();
    }

});

// เริ่มระบบ
connect();

</script>

</body>
</html>
