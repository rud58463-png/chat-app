<script>

const chat = document.getElementById("chat");

const params =
new URLSearchParams(window.location.search);

const appName =
params.get("name");

let joined = false;

const protocol =
location.protocol === "https:"
? "wss://"
: "ws://";

const ws =
new WebSocket(protocol + location.host);

// โหลดเสร็จ
ws.onopen = () => {

    let savedName =
    localStorage.getItem("chatName");

    // ถ้ามีชื่อส่งมาจาก MIT App
    if(appName && appName.trim() !== ""){

        savedName = appName;

        localStorage.setItem(
            "chatName",
            appName
        );

    }

    // ถ้ามีชื่อแล้ว auto join
    if(savedName){

        document.getElementById(
            "username"
        ).value = savedName;

        joinChat();

    }

};

// รับข้อความ
ws.onmessage = (event)=>{

    const data =
    JSON.parse(event.data);

    if(data.type === "clear"){

        chat.innerHTML = "";

    }

    if(data.type === "online"){

        document.getElementById(
            "online"
        ).innerHTML =
        "👥 ออนไลน์: "
        + data.count +
        " คน";

    }

    if(data.type === "message"){

        chat.innerHTML +=
        `<div class="msg">${data.text}</div>`;

        chat.scrollTop =
        chat.scrollHeight;

    }

};

// กด join
function joinChat(){

    if(joined)
    return;

    const username =
    document.getElementById(
        "username"
    ).value.trim();

    if(username === "")
    return;

    // เซฟชื่อ
    localStorage.setItem(
        "chatName",
        username
    );

    document.getElementById(
        "myName"
    ).innerHTML =
    "👤 ชื่อของคุณ: "
    + username;

    ws.send(JSON.stringify({
        type:"join",
        username:username
    }));

    document.getElementById(
        "joinBox"
    ).style.display =
    "none";

    joined = true;

}

// ส่งข้อความ
function sendMsg(){

    if(!joined)
    return;

    const msg =
    document.getElementById("msg");

    const text =
    msg.value.trim();

    if(text === "")
    return;

    ws.send(JSON.stringify({
        type:"chat",
        text:text
    }));

    msg.value = "";

}

// enter ส่ง
document.getElementById("msg")
.addEventListener(
    "keypress",
    (e)=>{

        if(e.key==="Enter"){

            sendMsg();

        }

    }
);

</script>
