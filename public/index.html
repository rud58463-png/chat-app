<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Chat Room</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#111;
    color:white;
    font-family:sans-serif;
    display:flex;
    flex-direction:column;
    height:100vh;
}

header{
    background:#1b1b1b;
    padding:15px;
    border-bottom:1px solid #333;
}

h2{
    margin:0;
}

#online,
#myName{
    margin-top:8px;
    font-size:16px;
}

#joinBox{
    padding:15px;
    display:flex;
    gap:10px;
}

#joinBox input{
    flex:1;
}

#chat{
    flex:1;
    overflow-y:auto;
    padding:12px;
    background:#181818;
}

.msg{
    background:#222;
    margin-bottom:8px;
    padding:10px;
    border-radius:10px;
    word-break:break-word;
}

#bottomBar{
    display:flex;
    gap:10px;
    padding:12px;
    border-top:1px solid #333;
    background:#1b1b1b;
}

input{
    border:none;
    outline:none;
    border-radius:12px;
    padding:14px;
    font-size:16px;
}

button{
    border:none;
    border-radius:12px;
    padding:14px 20px;
    font-size:16px;
    cursor:pointer;
}

#msg{
    flex:1;
}

</style>
</head>

<body>

<header>

<h2>💬 ห้องแชทรวม</h2>

<div id="online">
👥 ออนไลน์: 0 คน
</div>

<div id="myName">
👤 ชื่อของคุณ: ยังไม่ได้ Join
</div>

</header>

<div id="joinBox">
<input id="username" placeholder="ตั้งชื่อ">
<button onclick="joinChat()">Join</button>
</div>

<div id="chat"></div>

<div id="bottomBar">
<input id="msg" placeholder="พิมพ์ข้อความ">
<button onclick="sendMsg()">ส่ง</button>
</div>

<script>

const protocol =
location.protocol === "https:" ? "wss://" : "ws://";

const ws =
new WebSocket(protocol + location.host);

const chat =
document.getElementById("chat");

const params =
new URLSearchParams(window.location.search);

const appName =
params.get("name");

let joined = false;
let socketReady = false;

// WebSocket พร้อม
ws.onopen = () => {
    socketReady = true;

    let savedName = localStorage.getItem("chatName");
    if(appName){ savedName = appName; }
    if(savedName){ autoJoin(savedName); }
};

ws.onclose = () => {
    socketReady = false;
};

ws.onerror = (e) => {
    socketReady = false;
    console.error("WebSocket error:", e);
};

ws.onmessage = (event)=>{

    const data =
    JSON.parse(event.data);

    if(data.type === "clear"){
        chat.innerHTML = "";
    }

    if(data.type === "online"){

        document.getElementById("online").innerHTML =
        "👥 ออนไลน์: " + data.count + " คน";

    }

    if(data.type === "message"){

        chat.innerHTML +=
        `<div class="msg">${data.text}</div>`;

        chat.scrollTop =
        chat.scrollHeight;

    }

};

function autoJoin(username){

    if(ws.readyState !== WebSocket.OPEN) return;
    if(joined) return;

    localStorage.setItem(
        "chatName",
        username
    );

    document.getElementById("username").value =
    username;

    document.getElementById("myName").innerHTML =
    "👤 ชื่อของคุณ: " + username;

    ws.send(JSON.stringify({
        type:"join",
        username:username
    }));

    document.getElementById("joinBox")
    .style.display = "none";

    joined = true;

}

function joinChat(){
    const username = document.getElementById("username").value;
    if(username.trim() === "") return;

    if(ws.readyState !== WebSocket.OPEN){
        alert("กำลังเชื่อมต่อ... รอสักครู่แล้วลองใหม่");
        return;
    }

    autoJoin(username);
}

function sendMsg(){

    if(!joined) return;

    const msg =
    document.getElementById("msg");

    if(msg.value.trim() !== ""){

        ws.send(JSON.stringify({
            type:"chat",
            text:msg.value
        }));

        msg.value = "";

    }

}

document.getElementById("msg")
.addEventListener("keypress",(e)=>{

    if(e.key === "Enter"){
        sendMsg();
    }

});

</script>

</body>
</html>
