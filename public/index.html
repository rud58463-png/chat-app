<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ห้องแชท Rudjiroad</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
    body { background: #1a1a1a; color: #fff; min-height: 100vh; }
    .login-container { text-align: center; padding-top: 180px; }
    .login-container h2 { margin-bottom: 30px; color: #ff4444; font-size: 24px; }
    .btn { padding: 14px 28px; margin: 10px; font-size: 17px; border-radius: 8px; border: none; cursor: pointer; color: #fff; font-weight: 500; }
    .btn-google { background: #4285F4; }
    .btn-facebook { background: #1877F2; }
    .chat-container { display: none; max-width: 850px; margin: 0 auto; padding: 25px; }
    .chat-header { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #333; }
    .chat-header h3 { font-size: 20px; }
    .messages-box { height: 420px; overflow-y: auto; border: 1px solid #333; padding: 15px; border-radius: 8px; margin-bottom: 15px; background: #222; }
    .message { margin-bottom: 12px; line-height: 1.5; }
    .message strong { color: #4CAF50; margin-right: 8px; }
    .message span { color: #aaa; font-size: 13px; }
    .input-group { display: flex; gap: 10px; }
    .input-group input { flex: 1; padding: 14px; border: 1px solid #444; border-radius: 8px; background: #2a2a2a; color: #fff; font-size: 15px; }
    .input-group button { padding: 14px 24px; border: none; border-radius: 8px; background: #28a745; color: #fff; font-size: 15px; cursor: pointer; }
  </style>
</head>
<body>
  <div id="loginPage" class="login-container">
    <h2>⚠️ อยู่ระหว่างพัฒนา</h2>
    <button class="btn btn-google" onclick="loginGoogle()">เข้าสู่ระบบด้วย Google</button>
    <br>
    <button class="btn btn-facebook" onclick="loginFacebook()">เข้าสู่ระบบด้วย Facebook</button>
  </div>

  <div id="chatPage" class="chat-container">
    <div class="chat-header">
      <h3>ยินดีต้อนรับ, <span id="showName"></span></h3>
    </div>
    <div id="chatMessages" class="messages-box"></div>
    <div class="input-group">
      <input type="text" id="msgInput" placeholder="พิมพ์ข้อความที่นี่..." maxlength="200">
      <button onclick="sendMsg()">ส่งข้อความ</button>
    </div>
  </div>

  <script>
    // ใส่ค่า firebaseConfig ของคุณตรงนี้
    const firebaseConfig = {
      apiKey: "AIzaSyAePzrLqD2kfM7xQZbW8eR9tY7uI6oP5nM4b3V2c1X9z",
      authDomain: "chat-app-rudjiroad.firebaseapp.com",
      projectId: "chat-app-rudjiroad",
      storageBucket: "chat-app-rudjiroad.appspot.com",
      messagingSenderId: "744167583213",
      appId: "1:744167583213:web:71b2e3a7b1d7194"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    let idToken = "";
    let myId = "id_" + Math.random().toString(36).slice(2);
    let userData = {};
    let lastTime = Date.now() - 30000;

    // ตรวจสอบสถานะล็อกอิน
    auth.onAuthStateChanged(async user => {
      if (user) {
        userData = {
          name: user.displayName || user.email.split('@')[0],
          uid: user.uid,
          avatar: user.photoURL || "https://cdn-icons-png.flaticon.com/512/149/149071.png"
        };
        // ดึงโทเค็นเพื่อส่งตรวจสอบกับเซิร์ฟเวอร์
        idToken = await user.getIdToken();
        document.getElementById("showName").textContent = userData.name;
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("chatPage").style.display = "block";
        joinChat();
      } else {
        document.getElementById("loginPage").style.display = "block";
        document.getElementById("chatPage").style.display = "none";
      }
    });

    // ล็อกอิน Google
    function loginGoogle() {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider)
        .catch(err => alert("ผิดพลาด: " + err.message));
    }

    // ล็อกอิน Facebook
    function loginFacebook() {
      const provider = new firebase.auth.FacebookAuthProvider();
      auth.signInWithPopup(provider)
        .catch(err => alert("ผิดพลาด: " + err.message));
    }

    // เชื่อมต่อห้องแชท
    function xhr(method, url, data, cb) {
      const x = new XMLHttpRequest();
      x.open(method, url, true);
      x.timeout = 5000;
      x.setRequestHeader("Authorization", `Bearer ${idToken}`);
      if (method === "POST") x.setRequestHeader("Content-Type", "application/json");
      x.onreadystatechange = function() {
        if (x.readyState === 4) {
          try { cb(JSON.parse(x.responseText)); } catch(e) { cb(null); }
        }
      };
      x.onerror = () => cb(null);
      x.send(data ? JSON.stringify(data) : null);
    }

    function joinChat() {
      xhr("POST", "/join", { id: myId }, res => {
        if (res && res.ok) {
          startPolling();
        } else {
          alert("เข้าร่วมห้องแชทไม่สำเร็จ: " + (res?.reason || "ไม่ทราบสาเหตุ"));
        }
      });
    }

    function sendMsg() {
      const input = document.getElementById("msgInput");
      const text = input.value.trim();
      if (!text) return;
      input.value = "";
      xhr("POST", "/chat", { id: myId, text }, res => {
        if (!res || !res.ok) alert("ส่งข้อความไม่สำเร็จ");
      });
    }

    function poll() {
      xhr("GET", `/poll?id=${myId}&since=${lastTime}`, null, data => {
        if (!data) return;
        if (data.messages.length > 0) {
          data.messages.forEach(m => {
            const box = document.getElementById("chatMessages");
            const div = document.createElement("div");
            div.className = "message";
            div.innerHTML = `<strong>${m.username}</strong><span>[${new Date(m.time).toLocaleTimeString("th-TH", {hour:'2-digit', minute:'2-digit'})}]</span>: ${m.text}`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
            if (m.time > lastTime) lastTime = m.time;
          });
        }
      });
    }

    function startPolling() {
      poll();
      setInterval(poll, 1500);
    }

    document.getElementById("msgInput").addEventListener("keydown", e => {
      if (e.key === "Enter") sendMsg();
    });
  </script>
</body>
</html>
