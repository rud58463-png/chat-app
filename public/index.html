<script>

const chat =
document.getElementById("chat");

const params =
new URLSearchParams(window.location.search);

const appName =
params.get("name");

let joined = false;
let ws = null;

function connect(){

    const protocol =
    location.protocol === "https:"
    ? "wss://"
    : "ws://";

    ws =
    new WebSocket(protocol + location.host);

    ws.onopen = ()=>{

        console.log("connected");

        let savedName =
        localStorage.getItem("chatName");

        // ถ้าแอปส่งชื่อมา ให้ใช้ชื่อนี้
        if(appName && appName.trim() !== ""){
            savedName = appName;
            localStorage.setItem(
                "chatName",
                appName
            );
        }

        // ถ้ามีชื่ออยู่แล้ว auto join
        if(savedName){

            join(savedName);

        }else{

            document.getElementById(
                "joinBox"
            ).style.display =
            "flex";

        }

    };

    ws.onmessage = (event)=>{

        const data =
        JSON.parse(event.data);

        if(data.type === "clear"){
            chat.innerHTML = "";
        }

        if(data.type === "online"){

            document.getElementById(
                "online"
            ).innerHTML =
            "👥 ออนไลน์: "
            + data.count +
            " คน";

        }

        if(data.type === "message"){

            chat.innerHTML +=
            `<div class="msg">${data.text}</div>`;

            chat.scrollTop =
            chat.scrollHeight;

        }

    };

    ws.onclose = ()=>{

        joined = false;

        document.getElementById(
            "myName"
        ).innerHTML =
        "⏳ reconnecting...";

        setTimeout(connect,2000);

    };

}

// join จริง
function join(username){

    username =
    username.trim();

    if(username === "")
    return;

    if(
        !ws ||
        ws.readyState !==
        WebSocket.OPEN
    ){
        return;
    }

    if(joined)
    return;

    // เซฟชื่อ
    localStorage.setItem(
        "chatName",
        username
    );

    document.getElementById(
        "username"
    ).value =
    username;

    document.getElementById(
        "myName"
    ).innerHTML =
    "👤 ชื่อของคุณ: "
    + username;

    ws.send(JSON.stringify({
        type:"join",
        username:username
    }));

    document.getElementById(
        "joinBox"
    ).style.display =
    "none";

    joined = true;
}

// ปุ่ม join
function joinChat(){

    const username =
    document.getElementById(
        "username"
    ).value;

    join(username);

}

// ส่งข้อความ
function sendMsg(){

    if(!joined)
    return;

    const text =
    document.getElementById(
        "msg"
    ).value.trim();

    if(text === "")
    return;

    ws.send(JSON.stringify({
        type:"chat",
        text:text
    }));

    document.getElementById(
        "msg"
    ).value = "";

}

document.getElementById(
    "msg"
).addEventListener(
    "keypress",
    (e)=>{

        if(e.key==="Enter"){
            sendMsg();
        }

    }
);

connect();

</script>
