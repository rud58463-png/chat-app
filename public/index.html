<script>

const chat =
document.getElementById("chat");

const usernameInput =
document.getElementById("username");

const joinBox =
document.getElementById("joinBox");

const myName =
document.getElementById("myName");

const online =
document.getElementById("online");

const msgInput =
document.getElementById("msg");

const params =
new URLSearchParams(window.location.search);

const appName =
params.get("name");

let joined = false;
let ws = null;

// connect websocket
function connect(){

    const protocol =
    location.protocol === "https:"
    ? "wss://"
    : "ws://";

    ws =
    new WebSocket(
        protocol + location.host
    );

    ws.onopen = ()=>{

        console.log("connected");

        joined = false;

        let savedName =
        localStorage.getItem(
            "chatName"
        );

        // ถ้า MIT App ส่งชื่อมา
        if(
            appName &&
            appName.trim() !== ""
        ){

            savedName =
            appName;

            localStorage.setItem(
                "chatName",
                appName
            );
        }

        // auto join
        if(
            savedName &&
            savedName.trim() !== ""
        ){

            usernameInput.value =
            savedName;

            join(savedName);
        }

    };

    ws.onmessage = (event)=>{

        const data =
        JSON.parse(event.data);

        if(data.type==="clear"){

            chat.innerHTML = "";

        }

        if(data.type==="online"){

            online.innerHTML =
            "👥 ออนไลน์: "
            + data.count +
            " คน";

        }

        if(data.type==="message"){

            chat.innerHTML +=
            `<div class="msg">${data.text}</div>`;

            chat.scrollTop =
            chat.scrollHeight;

        }

    };

    ws.onclose = ()=>{

        joined = false;

        myName.innerHTML =
        "⏳ reconnecting...";

        setTimeout(
            connect,
            2000
        );

    };

}

// join ห้อง
function join(username){

    if(
        !ws ||
        ws.readyState !==
        WebSocket.OPEN
    ){
        return;
    }

    username =
    username.trim();

    if(username === "")
    return;

    if(joined)
    return;

    // save name
    localStorage.setItem(
        "chatName",
        username
    );

    usernameInput.value =
    username;

    myName.innerHTML =
    "👤 ชื่อของคุณ: "
    + username;

    ws.send(JSON.stringify({
        type:"join",
        username:username
    }));

    joinBox.style.display =
    "none";

    joined = true;
}

// ปุ่ม join
function joinChat(){

    const username =
    usernameInput.value;

    join(username);
}

// ส่งข้อความ
function sendMsg(){

    if(!joined)
    return;

    if(
        !ws ||
        ws.readyState !==
        WebSocket.OPEN
    ) return;

    const text =
    msgInput.value.trim();

    if(text === "")
    return;

    ws.send(JSON.stringify({
        type:"chat",
        text:text
    }));

    msgInput.value = "";
}

// enter send
msgInput.addEventListener(
    "keypress",
    (e)=>{

        if(e.key==="Enter"){

            sendMsg();

        }

    }
);

// start
connect();

</script>
